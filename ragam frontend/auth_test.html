<!DOCTYPE html>
<html>
<head>
    <title>Authentication Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-form { background: #f9f9f9; padding: 20px; margin: 10px 0; border-radius: 5px; }
        .result { padding: 10px; margin: 10px 0; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        button:hover { background: #0056b3; }
        input { padding: 8px; margin: 5px; border: 1px solid #ddd; border-radius: 3px; width: 200px; }
    </style>
</head>
<body>
    <h1>Ragam Authentication Test</h1>
    
    <div class="test-form">
        <h3>Test with Database Users</h3>
        <p>Try these users from your database:</p>
        
        <!-- Test Teacher Login -->
        <div>
            <h4>Teacher Login Test</h4>
            <input type="email" id="teacher_email" value="ram@gmail.com" placeholder="Email">
            <input type="password" id="teacher_password" value="ram123" placeholder="Password">
            <button onclick="testLogin('teacher', 'teacher_email', 'teacher_password')">Test Teacher Login</button>
        </div>
        
        <!-- Test Student Login -->
        <div>
            <h4>Student Login Test</h4>
            <input type="email" id="student_email" value="Rupak@gmail.com" placeholder="Email">
            <input type="password" id="student_password" value="rupak123" placeholder="Password">
            <button onclick="testLogin('student', 'student_email', 'student_password')">Test Student Login</button>
        </div>
        
        <!-- Alternative Student -->
        <div>
            <h4>Alternative Student Login Test</h4>
            <input type="email" id="student2_email" value="ravina@gmail.com" placeholder="Email">
            <input type="password" id="student2_password" value="ravina123" placeholder="Password">
            <button onclick="testLogin('teacher', 'student2_email', 'student2_password')">Test Ravina Login</button>
        </div>
    </div>
    
    <div id="results"></div>

    <script>
    function testLogin(userType, emailId, passwordId) {
        const email = document.getElementById(emailId).value;
        const password = document.getElementById(passwordId).value;
        
        const data = {
            email: email,
            password: password,
            user_type: userType
        };
        
        fetch('auth.php?action=login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(result => {
            const resultsDiv = document.getElementById('results');
            const resultClass = result.success ? 'success' : 'error';
            
            resultsDiv.innerHTML = `
                <div class="result ${resultClass}">
                    <h4>Login Result for ${email}</h4>
                    <p><strong>Success:</strong> ${result.success}</p>
                    <p><strong>Message:</strong> ${result.message}</p>
                    ${result.data ? `<p><strong>User Data:</strong> ${JSON.stringify(result.data, null, 2)}</p>` : ''}
                </div>
            ` + resultsDiv.innerHTML;
        })
        .catch(error => {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="result error">
                    <h4>Network Error</h4>
                    <p>Failed to connect to authentication API: ${error.message}</p>
                </div>
            ` + resultsDiv.innerHTML;
        });
    }
    </script>
</body>
</html>
